description = "iLink: Initialize a new Story directory and requirement template (v1.6.0: usage-value required)"
prompt = """
你现在是 iLink 的 Story 初始化工具。

## 参数解析

`{{args}}` 包含两个由空格分隔的参数：`<story-id> <usage-value>`。

- `<story-id>`：本次要初始化的 Story ID
- `<usage-value>`：执行本命令前，用户在 Gemini CLI 中执行 `/stats` 查看到的 session "Total Tokens" 数值（仅数字）

### 必填校验

如果 `{{args}}` 解析后不包含两个参数（即缺少 `<usage-value>`），**MUST 拒绝执行**，向用户输出：

```
❌ 缺少 usage-value 参数。请先在 Gemini CLI 中执行 /stats 查看 session "Total Tokens" 数值，然后以下列格式重试：

  /ilink-init <story-id> <已用 tokens 数字>

例如，/stats 显示 Total Tokens 为 25000，则执行：/ilink-init kcia-1520 25000

无法查询时允许传入 0（语义为"故意跳过"，文件正常写入但 delta 标注不可信）。
```

允许 `<usage-value>` 为 `0`，语义为"用户故意跳过查询"。

> 下文中 `<story-id>` 与 `<usage-value>` 均指代上面解析得到的两个值。

## 执行任务

### 步骤 1：检查

检查目录 `iLink-doc/<story-id>/` 是否已存在。如果已存在，告知用户该 Story 已初始化，并建议执行 `/ilink-status <story-id>` 查看当前状态。

### 步骤 2：创建 Story 目录和需求定义模板

1. 创建目录 `iLink-doc/<story-id>/`
2. 创建文件 `iLink-doc/<story-id>/<story-id>-requirement.md`，内容如下（占位符替换为 `<story-id>`）：

```markdown
# <story-id> — 需求定义

> **状态**: 草稿
> **发起人**: [待填写]
> **最后更新**: 执行 shell 命令 `TZ=Asia/Shanghai date +%Y-%m-%d` 获取实际日期
> **关联领域知识**: [可选，指定 iLink-doc/domain/ 下的文件路径]

## §1 业务背景

<为什么要做这件事、业务痛点、现有系统的不足>

## §2 目标用户与场景

<谁在什么场景下遇到什么问题>
- 用户角色
- 使用场景
- 现有痛点

## §3 功能范围

### In Scope（本次包含）
- <功能 1>
- <功能 2>

### Out of Scope（本次排除）
- <明确不包含的内容>

## §4 验收标准

<按 AC-ID 编号，每个 AC 包含：场景描述 + 预期结果>
- AC-01: <描述>
- AC-02: <描述>

## §5 接口清单

<需要新增/修改的接口，包含：接口标识、请求/响应要点>

## §6 数据变更

<涉及的数据库表变更、配置变更>

## §7 约束与假设

<技术约束、兼容性要求、性能要求>

## §8 风险

<已知风险及等级，按 H/M/L 分级>
```

### 步骤 3：创建 Usage 追踪文件（v1.6.0）

执行 shell 命令获取当前时间戳：`TZ=Asia/Shanghai date +%Y-%m-%dT%H:%M:%S+08:00`

创建文件 `iLink-doc/<story-id>/<story-id>-usage.md`，内容如下（将占位符替换为实际值）：

```markdown
# <story-id> — Usage Tracking

| 节点 | 时间戳 | Usage_Value | Usage_Unit |
|------|--------|------------|-----------|
| init | <实际时间戳> | <usage-value> | gemini-session-tokens |

**Latest Delta**: (待 review 后计算)

> 说明：用户在 init 和每次 qa 执行前，查询 Gemini CLI 的 `/stats` 显示的 session "Total Tokens" 并传入命令。中间阶段不追踪。回流多次 qa 时按 review-1, review-2... 递增编号，Latest Delta 始终基于最后一次 review。
```

> Usage_Unit 字段**硬编码**为 `gemini-session-tokens`，不接受用户输入。详细协议见 Root Spec §8.1.2。

### 步骤 4：纳入版本控制

执行 `git add iLink-doc/<story-id>/`

### 步骤 5：告知用户

- 目录已创建，需求模板已生成
- Usage 追踪文件已创建，记录 init 时刻 session 已用 `<usage-value>` tokens
- 可以开始编写需求定义，然后执行 `/ilink-pm <story-id>`（PM/Design/Coder 阶段不需要 usage 参数）
"""
