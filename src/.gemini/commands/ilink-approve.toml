description = "iLink: Approve — Coach reflection subprocess (design-only) + advance STAGING status (v1.6.0)"
prompt = """
你现在执行 iLink 的 **审核通过（Human-Gate 推进 + Coach 协作复盘）** 操作。

> 本命令自 v1.6.0 起内部串行执行：**校验前置 → 调用 Coach 子流程 → 写入 feedback.md → 推进 Status**。Coach 子流程详见 `iLink/iLink-root-spec.md` §4.7 与 `iLink/souls/coach.soul.md`。

## 执行任务

在 Story `{{args}}` 中找到处于 STAGING 状态的文档，先执行 Coach 子流程，再推进到下一阶段。

---

### 步骤 1：确认 Story 存在

检查 `iLink-doc/{{args}}/` 目录是否存在，不存在则提示用户先执行 `/ilink-init {{args}}`，结束。

### 步骤 2：按优先级查找 STAGING 文档

| 优先级 | 文档 | Coach | STAGING 时的目标状态 | 后续命令 |
|-------|------|-------|-------------------|---------|
| 1 | `{{args}}-review.master.md` | **跳过** | **不能自动推进**（上游根因） | 告知用户查看 [UPSTREAM_BLOCKERS]，与 Designer 讨论修改设计或修改需求定义后结束 |
| 2 | `{{args}}-design.master.md` | **运行** | `PENDING_CODER` | `/ilink-coder {{args}}` |
| 3 | `{{args}}-pm.master.md` | **跳过** | `PENDING_DESIGNER` | `/ilink-design {{args}}` |

如果没有 STAGING 文档，告知用户当前没有需要审核的文档，建议执行 `/ilink-status {{args}}` 后结束。

记录 `target_role` 为 `review` / `design` / `pm`，供后续步骤使用。

> **Root Spec §6.4**：Coach 子流程**仅在 design.master.md 推进场景启用**。PM 与 review 推进场景跳过 Coach，但 MUST 保留 Status 推进逻辑（review 场景由步骤 4 已做跳过）。

---

### 步骤 3：调用 Coach 子流程（仅当 `target_role == "design"` 时执行）

若 `target_role != "design"`，跳过本步骤所有子节（3.1–3.5），直接进入步骤 4，并在最终报告（步骤 5）中说明"本轮非 design 推进，跳过 Coach"。

读取 `iLink/souls/coach.soul.md`。

#### 3.1 摘录对话 bracket

在**当前 Gemini 会话**中识别：
- 外层窗口起点：`/ilink-pm {{args}}` 命令完成之后的第一个人类 turn
- 外层窗口终点：本次 `/ilink-approve {{args}}` 调用之前的最后一个人类 turn
- 内部分界：外层内的 `/ilink-design {{args}}` slash 调用 turn

逐 turn 原文摘录：标注 `[turn-N] (user|assistant)` 与 `[--- /ilink-design 分界 ---]`。**SHALL NOT** 改写、概括或选择性剔除任何 turn。

#### 3.2 计算直接编辑 diff

- 列出 `iLink-doc/{{args}}/.snapshots/design.master.*.md`，按文件名降序取最新
- 执行 `diff -u <最新快照> iLink-doc/{{args}}/{{args}}-design.master.md` 生成 unified diff
- 若快照缺失，记录 `"无法判定直接编辑（缺少 design 快照）"`

#### 3.3 调用 subagent

使用 Gemini 的子任务/独立上下文机制启动一个 fresh-context 子对话。**SHALL NOT** 传入 master doc、requirement.md 或源码。

若当前 Gemini 环境实际不支持真正的独立上下文 subagent，MUST 在 feedback.md 该轮反馈段首显式标注 `(未启用 fresh-context, parent 自评)`，便于人类识别该轮反馈可信度下降。

提示词：
```
你是 iLink Coach 子流程。请严格按照下方 coach.soul.md 的执行步骤（§6）和输出格式（§7）评估对话与 diff，输出单轮反馈 Markdown 段落。

请使用下方【时间戳】的值作为 §7.2 骨架中的分节标题（## <时间戳值> approve 复盘）。

【时间戳】<TZ=Asia/Shanghai date +%Y-%m-%dT%H:%M:%S+08:00>

【coach.soul.md】
<full content>

【对话摘录】
<3.1 内容>

【design diff】
<3.2 内容>

请直接返回 §7.2 骨架对应的 Markdown 段落（不要包含其他解释）。以 `## <时间戳值> approve 复盘` 开头。
```

#### 3.4 追加写入 feedback.md

- 路径：`iLink-doc/{{args}}/{{args}}-feedback.md`
- 文件不存在时新建，**不写入** Metadata 印章
- 追加一个空行，再追加 subagent 返回内容到末尾。SHALL NOT 覆盖历史
- 如果 subagent 响应未以 `## <timestamp> approve 复盘` 标题行开头，Parent AI MUST 在响应前插入该标题行（使用 3.3 prompt 中的同一时间戳）

#### 3.5 异常处理

subagent 失败或返回为空时，**SHALL NOT** 阻塞 Status 推进。在 feedback.md 追加：
```
## <时间戳> approve 复盘

> **Coach 子流程异常**：<原因>。本轮跳过协作复盘，Status 推进不受影响。
```

---

### 步骤 4：推进 Status

仅当步骤 2 命中优先级 2 或 3 时执行。使用 Edit 工具，在对应 STAGING 文档的 Metadata 区块中将 `Status: STAGING` 替换为目标状态值。

> 步骤 2 命中优先级 1（QA review STAGING）时跳过本步骤。

---

### 步骤 5：报告

向用户报告：
1. Coach 结果：
   - design target → ✅ Coach 反馈已追加到 `iLink-doc/{{args}}/{{args}}-feedback.md`
   - PM/review target → ⏭️ Coach skipped（非 design 推进场景）
2. Status 推进结果（或"未推进"及原因）
3. 提示下一步命令（参见步骤 2 表格"后续命令"列）

> Coach 反馈不参与下游 AI（Coder/QA）输入读取——它只服务人类协作复盘。MUST 提交到 git。
"""
